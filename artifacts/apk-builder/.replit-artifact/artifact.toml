kind = "web"
previewPath = "/"
title = "APK Builder Pro"
version = "1.0.0"
id = "artifacts/apk-builder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21448

[services.development]
run = "pnpm --filter @workspace/apk-builder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/apk-builder", "run", "build" ]
publicDir = "artifacts/apk-builder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21448"
BASE_PATH = "/"
